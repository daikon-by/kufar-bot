# Готовый образ из GitHub Container Registry (без сборки на сервере).
# Образ задаётся в .env: KUFAR_BOT_IMAGE=ghcr.io/<user>/kufar-bot:latest
services:
  kufar-bot:
    image: ${KUFAR_BOT_IMAGE:?Задайте KUFAR_BOT_IMAGE в .env}
    container_name: kufar-bot
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env
    environment:
      TZ: Europe/Minsk
    volumes:
      - ./data:/app/data
    working_dir: /app
